<!DOCTYPE html> 
<html lang="fr" data-theme="dark">
<head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="style.css">
    <script defer src="main.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&display=swap" rel="stylesheet">
    <!-- importation de polices d'écritures depuis goolgle font-->
    <title>Histori'art</title>
</head>

<body class="body">
    <header class="banner">
        <h1> Histori'art </h1>
        <div class="main">
            <h2>Le jeu de cartes sur l'histoire de l'art</h2>
        </div>
        <div class="guide">
            <div class="entree">
                <a href="index.html">✦Menu</a>
            </div>
            <div class="entree">
                <a href="annexe.html">✦ Les cartes</a>
            </div>
            <div class="entree">
                <a href="collection.html">✦ Les collections</a>
            </div>
        </div>
        <button class="button" id="themeToggle">Mode clair</button>
    </header>

    <main>

        <!-- onglets tabs -->
        <div class="tabs">
            <button class="tab active" data-target="communes">Communes</button>
            <button class="tab" data-target="rares">Rares</button>
            <button class="tab" data-target="maitres">Maîtres</button>
            <button class="tab" data-target="legendaires">Légendaires</button>
        </div>

        <!-- onglet carte socmmunes -->
        <div id="communes" class="tab-content visible">
            <!-- visible permet d'innitialiser le fait que lorqu'on ouvre la page c'est ça qui est affiché-->
            <div class="communes">
                <div class="c1"><img src="amandier.png" alt="amandier"></div>
                <div class="c2"><img src="chambreVG.png" alt="chambreVG"></div>
                <div class="c3"><img src="corbeaux.png" alt="Van Gogh corbeaux"></div>
                <div class="c4"><img src="tournesols.png" alt="tournesols"></div>
            </div>
        </div>

        <!-- onglet cartes rares-->
        <div id="rares" class="tab-content">
            <div class="rare">
                <div class="r1"><img src="feutre.png" alt="autoportrait chapeau feutre"></div>
                <div class="r2"><img src="moisson.png" alt="La moisson VG"></div>
                <div class="r3"><img src="maisonjaune.png" alt="maison jaune VG"></div>
                <div class="r4"><img src="racinesarbre.png" alt="racines arbre VG"></div>
            </div>
        </div>

        <!-- onglet cartes maitres -->
        <div id="maitres" class="tab-content">
            <div class="maitre">
                <div class="m1"><img src="autoportraitChevalet.png" alt="autoportraitChevalet"></div>
                <div class="m2"><img src="saintemariemarin.png" alt="saintemariemarin"></div>
                <div class="m3"><img src="squelette.png" alt="squelette et cigarette"></div>
                <div class="m4"><img src="Iris.png" alt="vase avec iris"></div>
            </div>
        </div>

        <!-- onglet carte slégendaires -->
        <div id="legendaires" class="tab-content">
            <div class="legendaire">
                <div class="l1"><img src="gauguin.png" alt="le fauteuil de paul gauguin"></div>
                <div class="l2"><img src="pecher.png" alt="pecher"></div>
                <div class="l3"><img src="paysagepluie.png" alt="paysagepluie"></div>
                <div class="l4"><img src="chaussures.png" alt="chaussures"></div>
            </div>
        </div>

    </main>

    <footer id="pagefooter" class="footer">
        <div class="imagefooter">
            <img src="carte.png" alt="carte">
        </div>
        <div class="textfooter">
            Tous droits réservés © 2025 Histori'art
        </div>
    </footer>
</body>
</html>
